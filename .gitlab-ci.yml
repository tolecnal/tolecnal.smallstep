stages:
  - lint
  - test

variables:
  DOCKER_DRIVER: overlay2

yamllint:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install yamllint
    - yamllint .

markdownlint:
  stage: lint
  image: node:20-slim
  script:
    - npm install -g markdownlint-cli
    - markdownlint-cli *.md

ansible-lint:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install ansible-core ansible-lint
    - ansible-lint .

ansible-security-scanner:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install ansible-security-scanner
    - ansible-security-scanner .

molecule:
  stage: test
  image: docker:24.0
  services:
    - docker:24.0-dind
  before_script:
    - apk add --no-cache python3 py3-pip gcc python3-dev musl-dev libffi-dev openssl-dev
    - pip3 install --break-system-packages ansible-core molecule molecule-plugins[docker] docker
  script:
    - molecule test
