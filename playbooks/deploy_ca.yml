---
- name: Deploy Smallstep CA Server
  hosts: ca_servers
  gather_facts: true
  become: true
  roles:
    - tolecnal.smallstep
  vars:
    smallstep_ca_init: true
    # Provide the vault password during ansible-playbook run
    smallstep_ca_password: "{{ vault_smallstep_ca_password }}"
    smallstep_provisioner_password: "{{ vault_smallstep_jwk_password }}"
    smallstep_provisioners:
      - name: "ansible-jwk"
        type: "JWK"
        password: "{{ vault_smallstep_jwk_password }}"
      - name: "acme"
        type: "ACME"
